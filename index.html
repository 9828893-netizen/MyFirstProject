<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
    <script>
        // Скрипт, щоб звук вмикався сам при появі маркера
        AFRAME.registerComponent('sound-handler', {
            init: function () {
                this.el.addEventListener('markerFound', () => {
                    let s = this.el.querySelector('[sound]');
                    if(s) s.components.sound.playSound();
                });
                this.el.addEventListener('markerLost', () => {
                    let s = this.el.querySelector('[sound]');
                    if(s) s.components.sound.stopSound();
                });
            }
        });
    </script>
</head>
<body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs='sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3;'>
        
        <a-assets>
            <img id="student-img" src="student.jpg">
            <img id="device-img" src="device.jpg">
            <img id="author-img" src="author.jpg">
            <audio id="student-audio" src="student.mp3" preload="auto"></audio>
            <audio id="device-audio" src="device.mp3" preload="auto"></audio>
            <audio id="author-audio" src="author.mp3" preload="auto"></audio>
        </a-assets>

        <a-marker type='barcode' value='1' sound-handler>
            <a-image src="#student-img" rotation="-90 0 0" width="1.5" height="1.5"></a-image>
            <a-entity sound="src: #student-audio; autoplay: false;"></a-entity>
        </a-marker>

        <a-marker type='barcode' value='2' sound-handler>
            <a-image src="#device-img" rotation="-90 0 0" width="1.5" height="1.5"></a-image>
            <a-entity sound="src: #device-audio; autoplay: false;"></a-entity>
        </a-marker>

        <a-marker type='barcode' value='3' sound-handler>
    <a-plane color="white" rotation="-90 0 0" width="1.1" height="1.1" position="0 -0.01 0"></a-plane>
    <a-image src="#device-img" rotation="-90 0 0" width="1" height="1"></a-image>
    <a-entity sound="src: #device-audio"></a-entity>
</a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
