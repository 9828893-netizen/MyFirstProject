<!DOCTYPE html>
<html>
<head>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs='sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3;'>
        
        <a-assets>
            <img id="student" src="student.jpg">
            <img id="device" src="device.jpg">
            <img id="author" src="author.jpg">
        </a-assets>

        <a-marker type='barcode' value='1'>
            <a-image src="#student" rotation="-90 0 0" width="1" height="1"></a-image>
        </a-marker>

        <a-marker type='barcode' value='2'>
            <a-image src="#device" rotation="-90 0 0" width="1" height="1"></a-image>
        </a-marker>

        <a-marker type='barcode' value='3'>
            <a-image src="#author" rotation="-90 0 0" width="1" height="1"></a-image>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
